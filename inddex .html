<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">ers
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>The Nominees Are :</h1>
    <p class="data"></p>
    <script>
        let para = document.querySelector('.data');
        const temp = [];

        // Fill the array
        for (let i = 0; i <= 13; i++) {
            temp[i] = i;
        }

        // Display the array
        for (let i = 0; i < temp.length; i++) {
            // Use += to append, otherwise it just replaces the previous number
            para.textContent += temp[i] + " ";
        }
    </script>
</body>

</html>
